<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الطعام والشراب</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Tahoma, Arial, sans-serif;
}

body{
    background:#FF9800;
    overflow:hidden;
    user-select:none;
    touch-action:none;
}

header{
    background:#fff;
    padding:12px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.fuel-container{
    width:90%;
    margin:10px auto 0;
    height:24px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

#fuel{
    width:100%;
    height:100%;
    background:#4CAF50;
}

#arena{
    position:relative;
    width:95%;
    height:82vh;
    margin:10px auto;
    background:#81D4FA;
    border-radius:20px;
    overflow:hidden;
}

.grass{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:70px;
    background:#4CAF50;
}

.word{
    position:absolute;
    background:#fff;
    padding:8px 14px;
    border-radius:12px;
    font-size:22px;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
    z-index:2;
}

.item{
    position:absolute;
    font-size:50px;
    cursor:grab;
    z-index:5;
}

#overlay{
    position:absolute;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.5);
    color:#fff;
    font-size:40px;
    font-weight:bold;
    z-index:100;
}

@media(max-width:768px){
    .word{
        font-size:18px;
    }

    .item{
        font-size:40px;
    }
}
</style>
</head>
<body>

<header>
    الطعام والشراب
    <div class="fuel-container">
        <div id="fuel"></div>
    </div>
</header>

<div id="arena">
    <div id="overlay"></div>
    <div class="grass"></div>
</div>

<script>

const arena = document.getElementById("arena");
const fuelBar = document.getElementById("fuel");
const overlay = document.getElementById("overlay");

let fuel = 100;
let matched = 0;
let gameRunning = true;

const foods = [
{emoji:"🥩", word:"لحم"},
{emoji:"🍗", word:"دجاج"},
{emoji:"🐟", word:"سمك"},
{emoji:"🍚", word:"أرز"},
{emoji:"🥗", word:"سلطة"},
{emoji:"🍎", word:"فاكهة"},
{emoji:"🍵", word:"شاي"},
{emoji:"☕", word:"قهوة"},
{emoji:"💧", word:"ماء"},
{emoji:"🌴", word:"تمر"},
{emoji:"🥛", word:"حليب"}
];

const wordTargets = [];

function playSuccess(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.frequency.value = 800;
    osc.type = "sine";

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.value = 0.2;

    osc.start();

    osc.frequency.setValueAtTime(1200,ctx.currentTime+0.1);

    osc.stop(ctx.currentTime+0.2);
}

function playFail(){
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.frequency.value = 150;
    osc.type = "sawtooth";

    osc.connect(gain);
    gain.connect(ctx.destination);

    gain.gain.value = 0.2;

    osc.start();
    osc.stop(ctx.currentTime+0.25);
}

foods.forEach((item,index)=>{

    const word = document.createElement("div");
    word.className = "word";
    word.textContent = item.word;
    word.dataset.word = item.word;

    word.style.left = (10 + Math.random()*75) + "%";
    word.style.top = (10 + Math.random()*55) + "%";

    arena.appendChild(word);
    wordTargets.push(word);

    const emoji = document.createElement("div");
    emoji.className = "item";
    emoji.textContent = item.emoji;
    emoji.dataset.word = item.word;

    emoji.x = Math.random()*(arena.clientWidth-80);
    emoji.y = 50 + Math.random()*200;

    emoji.vx = (Math.random()*2-1)*0.8;
    emoji.vy = (Math.random()*2-1)*0.8;

    emoji.style.left = emoji.x+"px";
    emoji.style.top = emoji.y+"px";

    arena.appendChild(emoji);

    makeDraggable(emoji);
});

function makeDraggable(el){

    let dragging = false;
    let offsetX = 0;
    let offsetY = 0;

    function start(e){

        dragging = true;

        const p = pointer(e);

        offsetX = p.x - el.offsetLeft;
        offsetY = p.y - el.offsetTop;

        el.style.cursor = "grabbing";
    }

    function move(e){

        if(!dragging) return;

        e.preventDefault();

        const p = pointer(e);

        el.x = p.x - offsetX;
        el.y = p.y - offsetY;

        el.style.left = el.x + "px";
        el.style.top = el.y + "px";
    }

    function end(){

        if(!dragging) return;

        dragging = false;
        el.style.cursor = "grab";

        checkMatch(el);
    }

    el.addEventListener("mousedown",start);
    window.addEventListener("mousemove",move);
    window.addEventListener("mouseup",end);

    el.addEventListener("touchstart",start,{passive:false});
    window.addEventListener("touchmove",move,{passive:false});
    window.addEventListener("touchend",end);
}

function pointer(e){

    const rect = arena.getBoundingClientRect();

    if(e.touches && e.touches.length){
        return {
            x:e.touches[0].clientX - rect.left,
            y:e.touches[0].clientY - rect.top
        };
    }

    return {
        x:e.clientX - rect.left,
        y:e.clientY - rect.top
    };
}

function intersects(a,b){

    const r1 = a.getBoundingClientRect();
    const r2 = b.getBoundingClientRect();

    return !(
        r1.right < r2.left ||
        r1.left > r2.right ||
        r1.bottom < r2.top ||
        r1.top > r2.bottom
    );
}

function checkMatch(emoji){

    let target = null;

    wordTargets.forEach(word=>{
        if(intersects(emoji,word)){
            target = word;
        }
    });

    if(!target) return;

    if(target.dataset.word === emoji.dataset.word){

        playSuccess();

        fuel = Math.min(100,fuel+15);
        updateFuel();

        emoji.remove();
        target.remove();

        matched++;

        if(matched === foods.length){
            gameWin();
        }

    }else{
        playFail();
    }
}

function updateFuel(){
    fuelBar.style.width = fuel + "%";
}

function gameWin(){
    gameRunning = false;
    overlay.style.display = "flex";
    overlay.textContent = "🎉 فزت!";
}

function gameOver(){
    gameRunning = false;
    overlay.style.display = "flex";
    overlay.textContent = "⛽ انتهى الوقود";
}

function animate(){

    if(gameRunning){

        document.querySelectorAll(".item").forEach(el=>{

            if(el.style.cursor === "grabbing") return;

            el.x += el.vx;
            el.y += el.vy;

            if(el.x < 0 || el.x > arena.clientWidth-60){
                el.vx *= -1;
            }

            if(el.y < 0 || el.y > arena.clientHeight-120){
                el.vy *= -1;
            }

            el.style.left = el.x + "px";
            el.style.top = el.y + "px";
        });

        fuel -= 0.01;

        if(fuel < 0){
            fuel = 0;
        }

        updateFuel();

        if(fuel <= 0){
            gameOver();
        }
    }

    requestAnimationFrame(animate);
}

updateFuel();
requestAnimationFrame(animate);

</script>

</body>
</html>
